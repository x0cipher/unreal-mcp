name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Opens/maintains a release PR; on merge it tags a release and updates
      # CHANGELOG.md + the version in the .uplugin and pyproject. Driven by the
      # conventional-commit history. Config: release-please-config.json +
      # .release-please-manifest.json.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
