name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Lint & import the MCP server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r server/requirements.txt

      - name: Ruff lint
        run: ruff check server

      - name: Ruff format check
        run: ruff format --check server

      - name: Import smoke test
        # The server module must import cleanly (no editor needed for this).
        run: python -c "import sys; sys.path.insert(0, 'server'); import unreal_mcp_server"
